app = "crypto-trading-bot"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[env]
  TZ = "UTC"

[[services]]
  internal_port = 8080        # 可选，若需健康检查可暴露端口
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[services.tcp_checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
